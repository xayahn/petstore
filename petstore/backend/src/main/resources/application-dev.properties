# Petstore Backend - Development Profile
# Activated with: spring.profiles.active=dev

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration - Development
spring.datasource.url=jdbc:postgresql://localhost:5432/petstore_dev
spring.datasource.username=postgres
spring.datasource.password=postgres_password

# JPA/Hibernate - Development (more verbose)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging - Development (DEBUG level)
logging.level.root=INFO
logging.level.com.petstore=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.data=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator - Development (expose all endpoints for debugging)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# JWT - Development (longer expiration for testing)
app.jwt.secret=dev-secret-key-minimum-32-characters-long-for-development
app.jwt.expiration=604800000

# Stripe - Development (test keys)
stripe.api-key=sk_test_placeholder
stripe.webhook-secret=whsec_test_placeholder
