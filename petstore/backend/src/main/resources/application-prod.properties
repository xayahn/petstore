# Petstore Backend - Production Profile
# Activated with: spring.profiles.active=prod

# Server Configuration
server.port=8080
server.servlet.context-path=/
server.ssl.enabled=true
server.ssl.key-store=${SSL_KEYSTORE_PATH:/etc/certs/keystore.p12}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.http2.enabled=true

# Database Configuration - Production
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate - Production (minimal logging)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# Logging - Production (WARN level)
logging.level.root=WARN
logging.level.com.petstore=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# Actuator - Production (limit exposed endpoints)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# JWT - Production (shorter expiration, secure secret from environment)
app.jwt.secret=${JWT_SECRET_KEY}
app.jwt.expiration=3600000

# Stripe - Production (live keys from environment)
stripe.api-key=${STRIPE_LIVE_API_KEY}
stripe.webhook-secret=${STRIPE_LIVE_WEBHOOK_SECRET}

# CORS - Production (strict origins)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://petstore.example.com}

# Cache
spring.cache.type=redis
spring.redis.host=${REDIS_HOST:redis}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD}
